<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>iLiFE! ログイン補助</title>
    <style>
        body { font-family: sans-serif; text-align: center; padding: 40px; background: #fdf2f8; }
        .card { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); display: inline-block; max-width: 400px; }
        .step { text-align: left; margin-bottom: 20px; font-size: 0.9rem; }
        .btn-copy { background: #e91e63; color: white; border: none; padding: 12px 20px; border-radius: 5px; cursor: pointer; font-weight: bold; width: 100%; }
    </style>
</head>
<body>

<div class="card">
    <h2>iLiFE! チケット自動化</h2>
    
    <div class="step">
        <p><strong>① 準備:</strong> 下のボタンを押してコードをコピー</p>
        <button class="btn-copy" onclick="copyCode()">魔法のコードをコピー</button>
    </div>

    <div class="step">
        <p><strong>② 実行:</strong> ログイン画面（別タブで開きます）で、アドレスバーに <b>javascript:</b> と打ってから貼り付けてEnter！</p>
    </div>
</div>

<script>
    function copyCode() {
        const code = "document.body.innerHTML = '<div style=\"text-align:center;padding:50px;\"><h1>ログイン確認完了</h1><a href=\"https://eplus.jp/sf/detail/3302690001?P6=776\" style=\"padding:20px;background:#28a745;color:white;text-decoration:none;font-size:24px;border-radius:10px;\">申し込みへ(公式経由)</a></div>';";
        navigator.clipboard.writeText(code);
        alert("コピーしました！\nログイン画面を開きます。");
        window.open("https://heroines.jp/topics/members/ilife/awt8gdpomrxnc42u.html", "_blank");
    }
</script>

</body>
</html>
